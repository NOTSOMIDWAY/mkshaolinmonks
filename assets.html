<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assets — MK Shaolin Monks Archive</title>
<link rel="stylesheet" href="../assets/css/mk.css">
<style>
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:8px}
.asset-card{padding:18px 20px;cursor:pointer}
.asset-icon{font-size:32px;margin-bottom:10px}
.asset-title{font-size:12px;font-weight:700;letter-spacing:0.06em;color:var(--gold2);margin-bottom:6px}
.asset-desc{font-family:"IM Fell English",serif;font-size:12px;color:var(--muted);line-height:1.7;font-style:italic}
.asset-meta{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:5px 14px;font-family:"Cinzel",serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;background:rgba(18,5,0,0.7);border:1px solid var(--border);border-radius:2px;color:var(--muted);cursor:pointer;transition:.2s}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.on{background:var(--blood);border-color:var(--blood2);color:var(--text)}
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.stat-mini{text-align:center;padding:14px 10px;background:rgba(12,3,0,0.9);border:1px solid var(--border);border-radius:4px}
.sm-n{font-family:"Cinzel Decorative",serif;font-size:22px;font-weight:900;color:var(--gold);text-shadow:0 0 10px rgba(201,168,76,0.35)}
.sm-l{font-size:8px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.upload-zone{border:2px dashed var(--border2);border-radius:6px;padding:40px;text-align:center;margin-top:24px;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--gold);background:rgba(201,168,76,0.04)}
.uz-icon{font-size:36px;margin-bottom:12px}
.uz-title{quences <span class="badge badge-red" style="vertical-align:middle;font-size:7px">LOCKED</span></div>
    <div class="asset-desc">seq_00.bin through seq_19.bin and dif_00–02.bin referenced in ELF. AI behavior data for enemy encounters. Paradox AI system: AIBrain, AISquad, AICombatBrain.</div>
    <div class="asset-meta"><span class="badge badge-red">Pending</span></div>
  </div>
</div>

<div class="upload-zone anim d3" onclick="document.getElementById('uploader').click()">
  <div class="uz-icon">⚔</div>
  <div class="uz-title">Upload Your Finding</div>
  <div class="uz-desc">Drag & drop or click to add extracted assets, screenshots, or analysis files. Community contributions welcomed.</div>
  <a href="submit.html" class="btn btn-gold" style="margin-top:16px;display:inline-flex">Submit via Form</a>
</div>

</div><footer><div>Created by <strong>OGmidway</strong> &mdash; MK Shaolin Monks Research Archive</div><div>Paradox Engine &middot; Midway Studios LA &middot; 2005</div><div>Open for contributions &mdash; <a href="submit.html" style="color:var(--gold)">Submit a Finding</a></div></footer></div>
<script>
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  };
});
</script>
</body></html>
